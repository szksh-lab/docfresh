go:
  script_shell:
    - go
    - run
  extensions:
    - .go
hcl:
  extensions:
    - .hcl
js:
  script_shell:
    - node
  command_shell:
    - node
    - -e
  extensions:
    - .js
json:
  extensions:
    - .json
md:
  extensions:
    - .md
py:
  script_shell:
    - python3
  command_shell:
    - python3
    - -c
  extensions:
    - .py
sh:
  script_shell:
    - bash
  command_shell:
    - bash
    - -c
  extensions:
    - .sh
    - .bash
tf:
  extensions:
    - .tf
toml:
  extensions:
    - .toml
ts:
  extensions:
    - .ts
yaml:
  extensions:
    - .yaml
    - .yml
